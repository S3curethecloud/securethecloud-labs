# One-time Phase 255 integration workflow
name: Phase 255 Enterprise Agent Developer Integration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/phase255-integrate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Integrate manifest and homepage
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path('manifest.json')
          homepage_path = Path('index.html')
          manifest = json.loads(manifest_path.read_text())

          module_id = 'enterprise-agent-developer-role-architecture'
          track_id = 'enterprise-agent-developer'
          module = {
              'id': module_id,
              'title': 'Enterprise Agent Developer Role Architecture',
              'cloud': track_id,
              'domain': 'Enterprise Agentic AI',
              'track': track_id,
              'level': 'L2',
              'status': 'implemented',
              'path': '/labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/',
              'backend_exposure': False
          }
          track = {
              'id': track_id,
              'title': 'Enterprise Agent Developer L2 Track',
              'cloud': track_id,
              'domain': 'Enterprise Agentic AI',
              'level': 'L2',
              'path': '/tracks/enterprise-agent-developer/',
              'status': 'active',
              'implemented_modules': 1,
              'planned_modules': 9,
              'backend_exposure': False,
              'production_enforcement_claim': False
          }

          labs = manifest.setdefault('labs', [])
          tracks = manifest.setdefault('tracks', [])
          matching_labs = [item for item in labs if item.get('id') == module_id]
          matching_tracks = [item for item in tracks if item.get('id') == track_id]
          if len(matching_labs) > 1 or len(matching_tracks) > 1:
              raise SystemExit('duplicate Phase 255 manifest record detected')
          if matching_labs:
              matching_labs[0].update(module)
          else:
              labs.insert(0, module)
          if matching_tracks:
              matching_tracks[0].update(track)
          else:
              tracks.append(track)
          manifest['last_updated'] = '2026-07-12'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n')

          html = homepage_path.read_text()
          for old, new in {
              '<div class="stat"><strong>63</strong><span>LAB modules</span></div>': '<div class="stat"><strong>64</strong><span>LAB modules</span></div>',
              '<div class="stat"><strong>5</strong><span>Learning paths</span></div>': '<div class="stat"><strong>6</strong><span>Learning paths</span></div>',
              '<div class="stat"><strong>39</strong><span>Total AI modules</span></div>': '<div class="stat"><strong>40</strong><span>Total AI modules</span></div>'
          }.items():
              if new not in html:
                  if html.count(old) != 1:
                      raise SystemExit(f'homepage count marker not unique: {old}')
                  html = html.replace(old, new, 1)

          track_card = '''
          <article class="track-card">
            <span>L2 · active</span>
            <h3>Enterprise Agent Developer L2 Track</h3>
            <p>Guided learning path for enterprise LLM agents, RAG, tool use, routing, orchestration, gateways, MCP, policy, observability, cloud delivery, and consulting leadership.</p>
            <a href="/tracks/enterprise-agent-developer/">Open Track →</a>
          </article>
'''
          if 'href="/tracks/enterprise-agent-developer/"' not in html:
              anchor = '''          <article class="track-card">
            <span>intermediate</span>
            <h3>AI Governance Command Center Track</h3>
            <p>Guided course for enterprise AI governance command center design.</p>
            <a href="/tracks/ai-governance-command-center/">Open Track →</a>
          </article>
'''
              if html.count(anchor) != 1:
                  raise SystemExit('guided learning path insertion anchor not unique')
              html = html.replace(anchor, anchor + track_card, 1)

          lab_card = '''
          <article class="lab-card" data-search="enterprise agent developer role architecture enterprise-agent-developer-role-architecture enterprise-agent-developer enterprise agentic ai l2 llm agentic workflows rag tools gateways mcp opa responsible ai opentelemetry consulting" data-cloud="enterprise-agent-developer" data-level="L2">
            <div class="lab-card-top">
              <div>
                <p class="lab-card-meta">ENTERPRISE AGENT DEVELOPER · ENTERPRISE AGENTIC AI · L2</p>
                <h3>Enterprise Agent Developer Role Architecture</h3>
              </div>
              <span class="level-badge">L2</span>
            </div>
            <p>Role-architecture LAB connecting discovery, agent design, RAG and tools, routing, gateways, MCP, policy, Responsible AI, OpenTelemetry, SLOs, cloud delivery, and stakeholder leadership.</p>
            <p class="track-note">Track: enterprise-agent-developer · Module 1 of 9</p>
            <a href="/labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/">Open Lab →</a>
          </article>

'''
          if '/labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/' not in html:
              anchor = '<div id="labGrid" class="lab-grid">\n'
              if html.count(anchor) != 1:
                  raise SystemExit('catalog insertion anchor not unique')
              html = html.replace(anchor, anchor + lab_card, 1)

          preview = '''
<section class="lab-section homepage-next-path-contained" id="enterprise-agent-developer-preview">
  <div class="section-heading">
    <p class="eyebrow">ACTIVE LEARNING PATH</p>
    <h2>Enterprise Agent Developer L2 Track</h2>
    <p>Senior Consultant learning path for building governed enterprise agents and agentic workflows across LLMs, RAG, tools, routing, gateways, MCP interoperability, policy, observability, cloud delivery, and client transformation.</p>
  </div>
  <div class="lab-grid">
    <article class="lab-card">
      <div class="lab-card-top">
        <div>
          <p class="lab-card-meta">ENTERPRISE AGENT DEVELOPER · ACTIVE TRACK</p>
          <h3>Enterprise Agent Developer L2 Track</h3>
        </div>
        <span class="level-badge">ACTIVE</span>
      </div>
      <p>Module 1 establishes the complete role architecture before deeper LABs specialize agent design, RAG, orchestration, gateway interoperability, governance, observability, cloud delivery, and senior-consultant execution.</p>
      <p class="track-note">Status: active track - 1 of 9 modules implemented - no live agent or gateway integration.</p>
      <a href="/tracks/enterprise-agent-developer/">Open Enterprise Agent Developer Track →</a>
    </article>
  </div>
</section>

'''
          if 'id="enterprise-agent-developer-preview"' not in html:
              anchor = '<footer class="stc-footer" aria-label="SecureTheCloud Labs footer">'
              if html.count(anchor) != 1:
                  raise SystemExit('homepage preview insertion anchor not unique')
              html = html.replace(anchor, preview + anchor, 1)
          homepage_path.write_text(html)
          PY

      - name: Run Phase 255 QA
        shell: bash
        run: |
          python3 -m json.tool manifest.json >/tmp/phase255-manifest.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('manifest.json').read_text())
          html = Path('index.html').read_text()
          module = [x for x in manifest['labs'] if x.get('id') == 'enterprise-agent-developer-role-architecture']
          track = [x for x in manifest['tracks'] if x.get('id') == 'enterprise-agent-developer']
          assert len(module) == 1 and module[0]['backend_exposure'] is False
          assert len(track) == 1
          assert track[0]['implemented_modules'] == 1 and track[0]['planned_modules'] == 9
          assert track[0]['status'] == 'active' and track[0]['backend_exposure'] is False
          assert '<strong>64</strong><span>LAB modules</span>' in html
          assert '<strong>6</strong><span>Learning paths</span>' in html
          assert '<strong>40</strong><span>Total AI modules</span>' in html
          assert '<strong>5</strong><span>Complete learning paths</span>' in html
          assert html.count('/labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/') == 1
          assert html.count('id="enterprise-agent-developer-preview"') == 1
          assert '<span class="level-badge">ACTIVE</span>' in html
          print('Phase 255 manifest and homepage QA passed')
          PY
          grep -n "labs.css\|lab-detail-shell\|lab-status-grid\|mobile-study-menu\|lab-detail-layout\|lab-side-nav\|lab-main-panels\|Concept Deep Dives\|Governance Boundary" labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/index.html
          grep -n "Backend exposure = false\|Credential handling = false\|Customer data access = false\|Runtime mutation = false\|Production enforcement claim = false" labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/index.html
          if grep -n "lab-shell\|lab-toc\|comparison-grid\|boundary-table\|badge-false\|<style>" labs/enterprise-agent-developer/enterprise-agent-developer-role-architecture/index.html; then
            echo 'Legacy or prohibited LAB marker detected'
            exit 1
          fi

      - name: Commit Phase 255 integration
        shell: bash
        run: |
          rm .github/workflows/phase255-integrate.yml
          git config user.name "SecureTheCloud Phase Automation"
          git config user.email "actions@users.noreply.github.com"
          git add index.html manifest.json .github/workflows/phase255-integrate.yml
          git commit -m "Complete Enterprise Agent Developer Role Architecture L2 lab integration"
          git push origin HEAD:main
